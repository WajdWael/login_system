{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2>Welcome, {{ username }}!</h2>
<p>Your role: <strong>{{ role }}</strong></p>
<p>This is your user dashboard.</p>
{% if role == 'admin' %}
    <p><a href="{{ url_for('admin_panel') }}">Go to Admin Panel</a></p>
{% endif %}
<p><a href="{{ url_for('logout') }}">Logout</a></p>
{% endblock %}
