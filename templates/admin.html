{% extends "base.html" %}

{% block title %}Admin Panel{% endblock %}

{% block content %}
<h2>Admin Panel</h2>
<p>All registered users:</p>
<ul>
    {% for user in users %}
        <li><strong>{{ user.username }}</strong> (Role: {{ user.role }})</li>
    {% endfor %}
</ul>
<p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a> | <a href="{{ url_for('logout') }}">Logout</a></p>
{% endblock %}
